spring.application.name=jiin-backend
server.port=8080

# 실행 프로파일 (local, prod)
spring.profiles.active=local

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger UI 접속 경로: http://localhost:8080/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/api-docs

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# JWT
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiry=3600000
jwt.cookie-name=access_token
# 로컬 개발 환경은 false, HTTPS 프로덕션 배포 시 true로 변경
jwt.cookie-secure=false

# OAuth2 로그인 성공 후 프론트로 리다이렉트할 베이스 URL
oauth2.redirect-uri=http://localhost:8090
